async function guardarReunion(key){
  const r = getReunionLocal(key);
  const fecha = document.getElementById('fecha-'+key).value;
  let kpis = {}, alertas = [];

  if(key === 'equipo'){
    // KPIs equipo
    const equipo = ['facundo_oroza','federico_caffarelli','lucas_luna'];
    let totalMes = 0, totalYTD = 0;
    equipo.forEach(k => {
      const info = VENDEDORES[k];
      const mes = ventasMesActualVendedor(info.dbName);
      const ytd = DATA.filter(x=>x.v===info.dbName && x.a===CURRENT_YEAR).reduce((s,x)=>s+toUSD(x),0);
      const tgt = (TARGETS.vendedores && TARGETS.vendedores[k]) || {mensual_usd:0};
      kpis[`${info.label} · ${MONTHS[CURRENT_MONTH-1]}`] = `${fmtFull(mes)} / target ${fmtFull(tgt.mensual_usd)} (${tgt.mensual_usd>0?Math.round(mes/tgt.mensual_usd*100):0}%)`;
      kpis[`${info.label} · YTD`] = fmtFull(ytd);
      totalMes += mes; totalYTD += ytd;
    });
    kpis[`TOTAL EQUIPO · ${MONTHS[CURRENT_MONTH-1]}`] = fmtFull(totalMes);
    kpis[`TOTAL EQUIPO · YTD ${CURRENT_YEAR}`] = fmtFull(totalYTD);
    kpis['Target equipo mensual'] = fmtFull(TARGETS.equipo_mensual_usd || 0);
    kpis['Snapshot tomado'] = new Date().toLocaleString('es-AR');
  } else {
    const info = VENDEDORES[key];
    const rows = DATA.filter(x => x.v === info.dbName);
    const ytd = rows.filter(x=>x.a===CURRENT_YEAR);
    const ytdUSD = ytd.reduce((s,x)=>s+toUSD(x),0);
    const prev = rows.filter(x=>x.a===CURRENT_YEAR-1).reduce((s,x)=>s+toUSD(x),0);
    const maxMes = Math.max(...ytd.map(x=>x.m),0);
    const mes = ventasMesActualVendedor(info.dbName);
    const tgt = (TARGETS.vendedores && TARGETS.vendedores[key]) || {mensual_usd:0};
    const mesesCompletos = (maxMes >= CURRENT_MONTH) ? Math.max(CURRENT_MONTH-1, 0) : maxMes;
    const ytdUSDCompletos = mesesCompletos > 0 ? ytd.filter(r=>r.m<=mesesCompletos).reduce((s,r)=>s+toUSD(r),0) : 0;
    const avgMes = mesesCompletos > 0 ? ytdUSDCompletos / mesesCompletos : 0;
    kpis = {
      [`Vendido ${MONTHS[CURRENT_MONTH-1]} ${CURRENT_YEAR}`]: `${fmtFull(mes)} (target ${fmtFull(tgt.mensual_usd)}, ${tgt.mensual_usd>0?Math.round(mes/tgt.mensual_usd*100):0}%)`,
      [`YTD ${CURRENT_YEAR}`]: fmtFull(ytdUSD),
      [`${CURRENT_YEAR-1} completo`]: fmtFull(prev),
      "Promedio mensual YTD": fmtFull(avgMes) + (mesesCompletos>0 && mesesCompletos<maxMes ? ` (${mesesCompletos} meses completos)` : ''),
      "Snapshot tomado": new Date().toLocaleString('es-AR')
    };
    // Alertas detectadas para guardar en el .md
    const alertasObj = detectarAlertas(info.dbName);
    alertas = alertasObj.slice(0,8).map(a => a.msg.replace(/<\/?b>/g, '*'));
  }

  const payload = {
    fecha,
    kpis,
    alertas,
    notas: r.notas,
    proximosPasos: r.proximos
  };
  try {
    const res = await fetch('/api/guardar?vendor='+key, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    const j = await res.json();
    if(j.ok){
      toast('Reunión guardada: '+j.filename, 'success');
      // Ofrecer limpiar notas y próximos por separado — el checklist siempre se conserva
      const r2 = getReunionLocal(key);
      let cambio = false;
      if(confirm('Reunión guardada ✓\n\n¿Querés limpiar las NOTAS para la próxima reunión?')){
        r2.notas = ''; cambio = true;
      }
      if(confirm('¿Querés limpiar los PRÓXIMOS PASOS / COMPROMISOS para la próxima reunión?')){
        r2.proximos = ''; cambio = true;
      }
      if(cambio){ setReunionLocal(key, r2); renderTodo(); }
    } else {
      toast('Error guardando: '+j.msg, 'error');
    }
  } catch(e) { toast('Error: '+e.message, 'error'); }
}

// ====== Historial ======
async function cargarHistorial(key){
  const cont = document.getElementById('historial-'+key);
  const list = document.getElementById('historial-list-'+key);
  cont.style.display = 'block';
  list.innerHTML = 'Cargando...';
  try {
    const r = await fetch('/api/reuniones?vendor='+key);
    const j = await r.json();
    if(!j.ok){ list.innerHTML = 'Error: '+j.msg; return; }
    if(!j.files.length){ list.innerHTML = '<p style="color:#94a3b8">Sin reuniones guardadas todavía.</p>'; return; }
    renderHistorialList(key, j.files);
  } catch(e){ list.innerHTML = 'Error: '+e.message; }
}

function renderHistorialList(key, files){
  const list = document.getElementById('historial-list-'+key);
  list.innerHTML = '';
  // Ordenar más reciente primero
  const sorted = [...files].sort((a,b) => b.localeCompare(a));
  sorted.forEach(f => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.dataset.file = f;
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.title = 'Seleccionar para borrar';
    chk.onchange = () => {
      div.classList.toggle('selected', chk.checked);
      actualizarBarraBorrado(key);
    };
    const fecha = document.createElement('span');
    fecha.className = 'date';
    fecha.textContent = f.replace('.md','');
    fecha.onclick = () => verReunion(key, f);
    const when = document.createElement('span');
    when.className = 'when';
    when.textContent = '— click para ver';
    when.onclick = () => verReunion(key, f);
    div.appendChild(chk);
    div.appendChild(fecha);
    div.appendChild(when);
    list.appendChild(div);
  });
  // Barra de borrado (oculta inicialmente)
  const bar = document.createElement('div');
  bar.className = 'history-del-bar';
  bar.id = 'del-bar-'+key;
  bar.style.display = 'none';
  bar.innerHTML = `<span id="del-bar-txt-${key}"></span>
    <button class="btn-cancel" onclick="deseleccionarTodo('${key}')">Cancelar</button>
    <button onclick="borrarSeleccionadas('${key}')">🗑 Borrar</button>`;
  list.appendChild(bar);
}

function actualizarBarraBorrado(key){
  const list = document.getElementById('historial-list-'+key);
  const seleccionadas = list.querySelectorAll('.history-item.selected');
  const bar = document.getElementById('del-bar-'+key);
  const txt = document.getElementById('del-bar-txt-'+key);
  if(!bar) return;
  if(seleccionadas.length === 0){
    bar.style.display = 'none';
  } else {
    bar.style.display = 'flex';
    txt.textContent = `${seleccionadas.length} reunión${seleccionadas.length>1?'es':''} seleccionada${seleccionadas.length>1?'s':''}`;
  }
}

function deseleccionarTodo(key){
  const list = document.getElementById('historial-list-'+key);
  list.querySelectorAll('.history-item').forEach(d => {
    d.classList.remove('selected');
    const chk = d.querySelector('input[type=checkbox]');
    if(chk) chk.checked = false;
  });
  actualizarBarraBorrado(key);
}

async function borrarSeleccionadas(key){
  const list = document.getElementById('historial-list-'+key);
  const seleccionadas = list.querySelectorAll('.history-item.selected');
  const files = Array.from(seleccionadas).map(d => d.dataset.file);
  if(!files.length) return;
  if(!confirm(`¿Confirmar borrado de ${files.length} reunión${files.length>1?'es':''}?\n\n${files.map(f=>f.replace('.md','')).join('\n')}`)) return;
  try {
    const r = await fetch('/api/borrar_reuniones?vendor='+key, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(files)
    });
    const j = await r.json();
    if(j.ok){
      toast(`${j.borrados.length} reunión${j.borrados.length>1?'es':''} borrada${j.borrados.length>1?'s':''}`, 'success');
      // Recargar la lista
      await cargarHistorial(key);
    } else {
      toast('Error: '+(j.msg||'desconocido'), 'error');
    }
  } catch(e){ toast('Error: '+e.message, 'error'); }
}

async function verReunion(key, filename){
  try {
    const r = await fetch('/api/reunion?vendor='+key+'&file='+encodeURIComponent(filename));
    const j = await r.json();
    if(j.ok){
      document.getElementById('modal-title').textContent = filename.replace('.md','');
      document.getElementById('modal-body').innerHTML = renderReunionMD(j.contenido);
      document.getElementById('modal').classList.add('show');
    } else { toast('Error: '+j.msg, 'error'); }
  } catch(e){ toast('Error: '+e.message, 'error'); }
}

function renderReunionMD(md){
  // Parsear secciones del archivo .md
  const lines = md.split('\n');
  const meta = {};
  const kpis = [];
  const checklist = [];
  let notasRaw = '';
  let proximosRaw = '';

  let seccion = '';
  for(let i = 0; i < lines.length; i++){
    const l = lines[i];
    // Metadatos
    if(l.startsWith('**Fecha:**'))    { meta.fecha    = l.replace('**Fecha:**','').trim(); continue; }
    if(l.startsWith('**Guardado:**')) { meta.guardado = l.replace('**Guardado:**','').trim(); continue; }
    if(l.startsWith('**Snapshot tomado:**')) continue;
    // Detectar secciones
    if(l.startsWith('## KPIs'))                     { seccion = 'kpis';      continue; }
    if(l.startsWith('## Temas conversados'))         { seccion = 'checklist'; continue; }
    if(l.startsWith('## Notas'))                     { seccion = 'notas';     continue; }
    if(l.startsWith('## Próximos pasos') ||
       l.startsWith('## Proximos pasos'))            { seccion = 'proximos';  continue; }
    if(l.startsWith('## ') || l.startsWith('# '))   { seccion = 'otro';      continue; }
    // Acumular por sección
    if(seccion === 'kpis' && l.startsWith('- **')){
      // "- **Facundo Oroza · Jun:** $20.480 / target $62.000 (33%)"
      const m = l.match(/^- \*\*(.+?):\*\*\s*(.+)$/);
      if(m) kpis.push({label: m[1], val: m[2]});
    } else if(seccion === 'checklist' && (l.startsWith('- [ ]') || l.startsWith('- [x]') || l.startsWith('- [X]'))){
      const done = l.startsWith('- [x]') || l.startsWith('- [X]');
      const text = l.replace(/^- \[[ xX]\] /, '');
      checklist.push({done, text});
    } else if(seccion === 'notas'){
      notasRaw += (notasRaw ? '\n' : '') + l;
    } else if(seccion === 'proximos'){
      proximosRaw += (proximosRaw ? '\n' : '') + l;
    }
  }

  // Renderizar metadata
  let html = '<div class="rview">';

  if(meta.fecha || meta.guardado){
    html += '<div class="rview-meta">';
    if(meta.fecha)    html += `<span><b>Fecha:</b> ${esc(meta.fecha)}</span>`;
    if(meta.guardado) html += `<span><b>Guardado:</b> ${esc(meta.guardado)}</span>`;
    html += '</div>';
  }

  // KPIs — dos formatos: equipo (labels con ·) o vendedor individual
  if(kpis.length){
    var _pctCls = function(p){ return p>=80?'green':p>=50?'amber':'red'; };
    var _kpiCard = function(name, actual, target, pct, isTotal){
      var cls = pct!==null ? _pctCls(pct) : '';
      return '<div class="rview-kpi-card'+(isTotal?' total':'')+'">'+
        '<div class="kc-name">'+esc(name)+'</div>'+
        '<div class="kc-amounts"><span class="kc-actual">'+esc(actual)+'</span>'+
        (target?'<span class="kc-sep">/</span><span class="kc-target">'+esc(target)+'</span>':'')+
        (pct!==null?'<span class="kc-pct '+cls+'">'+pct+'%</span>':'')+
        '</div>'+
        (pct!==null?'<div class="kc-bar"><div class="kc-fill '+cls+'" style="width:'+Math.min(pct,100)+'%"></div></div>':'')+
        '</div>';
    };

    var esEquipo = kpis.some(function(k){ return k.label.indexOf('·')>=0; });

    if(esEquipo){
      // ── Formato equipo ──
      var kpiMes   = kpis.filter(function(k){ return k.label.indexOf('YTD')<0 && k.label.indexOf('Target')<0 && k.label.indexOf('Snapshot')<0; });
      var kpiYTD   = kpis.filter(function(k){ return k.label.indexOf('YTD')>=0; });
      var tgtEquip = kpis.find(function(k){ return k.label.indexOf('Target equipo')>=0; });
      var parseEq  = function(val){
        var m = val.match(/^\$([0-9.,]+)\s*\/\s*target\s*\$([0-9.,]+)\s*\((\d+)%\)/);
        if(m) return {actual:'$'+m[1], target:'$'+m[2], pct:parseInt(m[3])};
        var ms = val.match(/^\$([0-9.,]+)/);
        return {actual:ms?'$'+ms[1]:val, target:null, pct:null};
      };
      var mesVend  = kpiMes.filter(function(k){ return k.label.indexOf('TOTAL')<0; });
      var mesTotal = kpiMes.find(function(k){ return k.label.indexOf('TOTAL')>=0; });
      var cols1    = mesVend.length + (mesTotal?1:0) || 1;

      html += '<div class="rview-section"><div class="rview-section-title">📅 Mes actual — ventas vs target</div>';
      html += '<div class="rview-kpi-row" style="grid-template-columns:repeat('+Math.min(cols1,4)+',1fr)">';
      mesVend.forEach(function(k){
        var p=parseEq(k.val), vname=k.label.split('·')[0].trim();
        html += _kpiCard(vname, p.actual, p.target, p.pct, false);
      });
      if(mesTotal){
        var pt=parseEq(mesTotal.val);
        if(pt.pct===null && tgtEquip){
          var an=parseFloat(pt.actual.replace(/[$.,]/g,''))||0, tn=parseFloat(tgtEquip.val.replace(/[$.,]/g,''))||0;
          if(tn>0){pt.pct=Math.round(an/tn*100); pt.target=tgtEquip.val;}
        }
        html += _kpiCard('Total equipo', pt.actual, pt.target, pt.pct, true);
      }
      html += '</div>';

      if(kpiYTD.length){
        var ytdVend  = kpiYTD.filter(function(k){ return k.label.indexOf('TOTAL')<0; });
        var ytdTotal = kpiYTD.find(function(k){ return k.label.indexOf('TOTAL')>=0; });
        var cols2    = ytdVend.length + (ytdTotal?1:0) || 1;
        html += '<div class="rview-ytd-row" style="grid-template-columns:repeat('+Math.min(cols2,4)+',1fr);margin-top:6px">';
        ytdVend.forEach(function(k){
          var vname=k.label.split('·')[0].trim();
          html += '<div class="rview-ytd-card"><span class="yc-name">'+esc(vname)+' YTD</span><span class="yc-val">'+esc(k.val)+'</span></div>';
        });
        if(ytdTotal) html += '<div class="rview-ytd-card total"><span class="yc-name">Total YTD</span><span class="yc-val">'+esc(ytdTotal.val)+'</span></div>';
        html += '</div>';
      }
      html += '</div>'; // cierre rview-section

    } else {
      // ── Formato vendedor individual ──
      var kVend = kpis.find(function(k){ return k.label.indexOf('Vendido')===0; });
      var kYTD  = kpis.find(function(k){ return k.label.indexOf('YTD')===0; });
      var kPrev = kpis.find(function(k){ return k.label.indexOf('completo')>=0; });
      var kProm = kpis.find(function(k){ return k.label.indexOf('Promedio')>=0; });
      var parseVend = function(val){
        var m = val.match(/^\$([0-9.,]+)\s*\(target\s*\$([0-9.,]+),\s*(\d+)%\)/);
        if(m) return {actual:'$'+m[1], target:'$'+m[2], pct:parseInt(m[3])};
        var ms = val.match(/^\$([0-9.,]+)/);
        return {actual:ms?'$'+ms[1]:val, target:null, pct:null};
      };

      html += '<div class="rview-section"><div class="rview-section-title">📅 Mes actual — ventas vs target</div>';
      if(kVend){
        var pv=parseVend(kVend.val), periodo=kVend.label.replace('Vendido ','');
        html += '<div class="rview-kpi-row" style="grid-template-columns:1fr">';
        html += _kpiCard(periodo, pv.actual, pv.target, pv.pct, false);
        html += '</div>';
      }
      html += '</div>';

      var extras = [kYTD, kPrev, kProm].filter(Boolean);
      if(extras.length){
        html += '<div class="rview-ytd-row" style="grid-template-columns:repeat('+Math.min(extras.length,3)+',1fr);margin-top:6px">';
        extras.forEach(function(k){
          html += '<div class="rview-ytd-card"><span class="yc-name">'+esc(k.label)+'</span><span class="yc-val">'+esc(k.val)+'</span></div>';
        });
        html += '</div>';
      }
    }
  } // fin if(kpis.length)

  // Checklist
  if(checklist.length){
    html += '<div class="rview-section"><div class="rview-section-title">✅ Temas conversados</div>';
    html += '<ul class="rview-checklist">';
    checklist.forEach(it => {
      html += `<li><span class="ci${it.done?' done':''}">${it.done?'✓':''}</span><span>${esc(it.text)}</span></li>`;
    });
    html += '</ul></div>';
  }

  // Notas — contiene HTML del RTE
  const notasTrimmed = notasRaw.trim();
  html += '<div class="rview-section"><div class="rview-section-title">📝 Notas de la reunión</div>';
  if(!notasTrimmed || notasTrimmed === '_(sin definir)_'){
    html += '<div class="rview-empty">Sin notas registradas.</div>';
  } else {
    // Si empieza con tag HTML, renderizar directamente; si no, escapar
    const isHTML = /^<[a-zA-Z]/.test(notasTrimmed);
    html += `<div class="rview-richtext">${isHTML ? notasTrimmed : esc(notasTrimmed)}</div>`;
  }
  html += '</div>';

  // Próximos pasos — también HTML del RTE
  const proxTrimmed = proximosRaw.trim();
  html += '<div class="rview-section"><div class="rview-section-title">🎯 Próximos pasos / compromisos</div>';
  if(!proxTrimmed || proxTrimmed === '_(sin definir)_'){
    html += '<div class="rview-empty">Sin próximos pasos registrados.</div>';
  } else {
    const isHTML = /^<[a-zA-Z]/.test(proxTrimmed);
    html += `<div class="rview-richtext">${isHTML ? proxTrimmed : esc(proxTrimmed)}</div>`;
  }
  html += '</div>';

  html += '</div>';
  return html;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function cerrarModal(){ document.getElementById('modal').classList.remove('show'); }

// ====== Editor de Eventos ======
function abrirEditorEventos(){
  const lista = document.getElementById('ev-lista');
  lista.innerHTML = '';
  // Mostrar todos ordenados por fecha
  const todos = [...EVENTOS_PROXIMOS].sort((a,b) => a.fecha.localeCompare(b.fecha));
  todos.forEach((ev, i) => evRenderFila(ev, i));
  document.getElementById('modal-eventos').classList.add('show');
}

function cerrarEditorEventos(){
  document.getElementById('modal-eventos').classList.remove('show');
}

function evRenderFila(ev, idx){
  const lista = document.getElementById('ev-lista');
  const vendOpts = Object.entries(VENDEDORES).map(([k,v]) =>
    `<option value="${k}" ${ev.vendedor===k?'selected':''}>${v.label.split(' ')[0]}</option>`).join('');
  const row = document.createElement('div');
  row.className = 'ev-row';
  row.dataset.idx = idx;
  row.innerHTML = `
    <input type="month" value="${ev.fecha}" onchange="evActualizar(${idx},'fecha',this.value)">
    <input type="text" value="${ev.titulo}" placeholder="Descripción del evento" onchange="evActualizar(${idx},'titulo',this.value)">
    <select onchange="evActualizar(${idx},'tipo',this.value)">
      <option value="evento" ${ev.tipo==='evento'?'selected':''}>📅 Evento</option>
      <option value="export" ${ev.tipo==='export'?'selected':''}>🌎 Export</option>
      <option value="producto" ${ev.tipo==='producto'?'selected':''}>📦 Producto</option>
    </select>
    <select onchange="evActualizar(${idx},'vendedor',this.value)">
      <option value="">— Todos —</option>
      ${vendOpts}
    </select>
    <button class="btn-del" onclick="evEliminar(${idx})" title="Eliminar">🗑</button>`;
  lista.appendChild(row);
}

// Buffer local de edición (independiente de EVENTOS_PROXIMOS hasta guardar)
let _evBuffer = [];

function abrirEditorEventosConBuffer(){
  _evBuffer = EVENTOS_PROXIMOS.map(e => ({...e})).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const lista = document.getElementById('ev-lista');
  lista.innerHTML = '';
  _evBuffer.forEach((ev, i) => evRenderFilaBuffer(ev, i));
  document.getElementById('modal-eventos').classList.add('show');
}

// Sobreescribir la función simple con la de buffer
function abrirEditorEventos(){
  _evBuffer = EVENTOS_PROXIMOS.map(e => ({...e})).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const lista = document.getElementById('ev-lista');
  lista.innerHTML = '';
  _evBuffer.forEach((ev, i) => evRenderFilaBuffer(ev, i));
  document.getElementById('modal-eventos').classList.add('show');
}

function evRenderFilaBuffer(ev, i){
  const lista = document.getElementById('ev-lista');
  const vendOpts = Object.entries(VENDEDORES).map(([k,v]) =>
    `<option value="${k}" ${ev.vendedor===k?'selected':''}>${v.label.split(' ')[0]}</option>`).join('');
  const row = document.createElement('div');
  row.className = 'ev-row';
  row.dataset.idx = i;
  row.innerHTML = `
    <input type="month" value="${ev.fecha}" oninput="_evBuffer[${i}].fecha=this.value">
    <input type="text" value="${ev.titulo}" placeholder="Descripción" oninput="_evBuffer[${i}].titulo=this.value">
    <select onchange="_evBuffer[${i}].tipo=this.value">
      <option value="evento" ${ev.tipo==='evento'?'selected':''}>📅 Evento</option>
      <option value="export" ${ev.tipo==='export'?'selected':''}>🌎 Export</option>
      <option value="producto" ${ev.tipo==='producto'?'selected':''}>📦 Producto</option>
    </select>
    <select onchange="_evBuffer[${i}].vendedor=this.value">
      <option value="">— Todos —</option>
      ${vendOpts}
    </select>
    <button class="btn-del" title="Eliminar" onclick="evEliminarBuffer(${i})">🗑</button>`;
  lista.appendChild(row);
}

function evEliminarBuffer(i){
  _evBuffer.splice(i, 1);
  const lista = document.getElementById('ev-lista');
  lista.innerHTML = '';
  _evBuffer.forEach((ev, idx) => evRenderFilaBuffer(ev, idx));
}

function evAgregarFila(){
  const mesProx = (() => {
    const d = new Date(); d.setMonth(d.getMonth()+1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  })();
  const nuevoEv = {id: Date.now(), fecha: mesProx, titulo: '', tipo: 'evento', vendedor: ''};
  _evBuffer.push(nuevoEv);
  evRenderFilaBuffer(nuevoEv, _evBuffer.length - 1);
}

async function guardarEventos(){
  // Asignar IDs a los nuevos (sin id o id temporal)
  _evBuffer.forEach((e, i) => { if(!e.id) e.id = Date.now() + i; });
  try {
    const r = await fetch('/api/eventos', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(_evBuffer)
    });
    const j = await r.json();
    if(j.ok){
      EVENTOS_PROXIMOS = [..._evBuffer];
      cerrarEditorEventos();
      renderTodo();
      toast('Eventos guardados ✓');
    } else {
      toast('Error: ' + j.msg, 'error');
    }
  } catch(e){ toast('Error guardando: '+e.message, 'error'); }
}

cargarDatos();
