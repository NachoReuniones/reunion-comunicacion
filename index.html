<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Reuniones · Luctron</title>

    <!-- Pre-paint del tema (evita flash en dark mode) -->
    <script>
    (function () {
        try {
            var t = localStorage.getItem('lumi-reunion.theme');
            if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* === CSS Variables (LUMI Design System) === */
        :root {
            /* Paleta principal */
            --c-dark:           #000000;
            --c-midnight:       #0F0F0F;
            --c-deep-blue:      #0C2136;
            --c-misty-blue:     #3E688F;
            --c-white:          #FFFFFF;
            --c-light-gray:     #E8E8E8;
            --c-medium-gray:    #B0B0B0;

            /* Superficies (LIGHT) */
            --bg:               #F2F2F2;
            --surface:          #FFFFFF;
            --surface-2:        #FAFAFA;
            --surface-hover:    #F6F6F6;
            --feature-bg:       var(--c-deep-blue);

            --border:           #E4E4E4;
            --border-soft:      #EDEDED;
            --border-strong:    #D8D8D8;

            --text:             #0F0F0F;
            --text-2:           #2A2A2A;
            --muted:            #6B6B6B;
            --muted-2:          #9A9A9A;
            --on-dark:          #FFFFFF;
            --on-dark-muted:    #B7C3D1;

            --accent:           var(--c-deep-blue);
            --accent-2:         var(--c-misty-blue);
            --accent-soft:      #ECF1F7;

            /* Status */
            --verde:            #2E7A4F;
            --verde-bg:         #E8F4ED;
            --verde-border:     #B8DCC4;
            --rojo:             #B33B3A;
            --rojo-bg:          #FDECEC;
            --rojo-border:      #F5C9C8;

            /* Tipografía */
            --font: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

            /* Layout */
            --radius:           14px;
            --radius-sm:        10px;
            --radius-xs:        6px;
            --pill:             999px;
        }

        [data-theme="dark"] {
            --bg:               #0A0A0A;
            --surface:          #131313;
            --surface-2:        #181818;
            --surface-hover:    #1E1E1E;

            --border:           #262626;
            --border-soft:      #1F1F1F;
            --border-strong:    #333333;

            --text:             #F5F5F5;
            --text-2:           #D6D6D6;
            --muted:            #8B8B8B;
            --muted-2:          #5F5F5F;

            --accent:           var(--c-misty-blue);
            --accent-2:         #5C8AB5;
            --accent-soft:      #14233A;

            --verde:            #62B689;
            --verde-bg:         rgba(46, 122, 79, .16);
            --rojo:             #E07D7C;
            --rojo-bg:          rgba(179, 59, 58, .16);
            --rojo-border:      rgba(179, 59, 58, .35);
        }

        /* === Reset & Base === */
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 13.5px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.005em;
            transition: background-color .15s, color .15s;
        }

        /* === Layout Principal === */
        .app-container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 60px 1fr;
            min-height: 100vh;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.2px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--bg);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color .12s;
        }

        .theme-toggle:hover {
            background: var(--surface-hover);
        }

        .theme-toggle svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            color: var(--text);
        }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        [data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        /* === Main Content === */
        .app-main {
            padding: 24px 32px;
            overflow-y: auto;
        }

        .layout-2col {
            display: grid;
            grid-template-columns: minmax(320px, 0.75fr) 1fr;
            gap: 10px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .layout-2col {
                grid-template-columns: 1fr;
            }
        }

        /* === Card === */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            transition: border-color .12s;
            display: flex;
            flex-direction: column;
            height: fit-content;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-soft);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.1px;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* === Temas List === */
        .temas-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .temas-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 200px;
        }

        .tema-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-sm);
            cursor: grab;
            transition: background-color .12s, border-color .12s;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }

        .tema-item:hover {
            background: var(--surface-hover);
            border-color: var(--border-strong);
        }

        /* Item original mientras se arrastra su clon */
        .tema-item.drag-source {
            opacity: 0.35;
        }

        /* Clon flotante que sigue al cursor */
        .drag-clone {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            margin: 0;
            cursor: grabbing;
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
            background: var(--surface);
        }

        /* Línea indicadora de dónde se va a soltar */
        .drag-placeholder {
            height: 2px;
            background: var(--accent-2);
            border-radius: 2px;
            margin: 1px 0;
            flex-shrink: 0;
        }

        /* Lista resaltada como zona de drop activa */
        .temas-list.list-drop-active {
            outline: 2px dashed var(--accent-2);
            outline-offset: 4px;
            border-radius: var(--radius-sm);
        }

        /* Campo de texto resaltado al arrastrar un tema encima */
        textarea.campo-drop-active {
            outline: 2px dashed var(--accent-2);
            outline-offset: 2px;
            background: var(--surface) !important;
            border-color: var(--accent-2) !important;
        }

        body.dragging-active {
            cursor: grabbing;
            user-select: none;
        }

        .tema-item.conversado {
            opacity: 0.6;
        }

        .tema-item.conversado .tema-text {
            text-decoration: line-through;
            color: var(--muted);
        }

        .tema-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--verde);
        }

        .tema-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-2);
            transition: all .12s;
        }

        .tema-remove {
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
            border-radius: var(--radius-xs);
            transition: all .12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tema-remove:hover {
            background: var(--rojo-bg);
            color: var(--rojo);
        }

        .rojo { --rojo: #B33B3A; --rojo-bg: #FDECEC; }

        /* === Input Nuevo Tema === */
        .nuevo-tema-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .nuevo-tema-input-wrapper input {
            flex: 1;
            min-width: 0;
        }

        input[type="text"], textarea {
            padding: 9px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            transition: border-color .12s, background .12s;
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: var(--muted-2);
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            background: var(--surface);
            border-color: var(--accent-2);
        }

        .input-container {
            flex: 1;
        }

        /* === Botones === */
        .btn {
            border: none;
            border-radius: var(--pill);
            padding: 8px 16px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all .12s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--c-midnight);
            color: var(--c-white);
        }

        .btn-primary:hover {
            background: var(--c-dark);
        }

        [data-theme="dark"] .btn-primary {
            background: var(--c-misty-blue);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--border-strong);
            background: var(--surface-hover);
        }

        /* === Notas === */
        .notas-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notas-editor textarea {
            width: 100%;
            min-height: 200px;
            resize: vertical;
            padding: 12px;
            font-size: 13px;
        }

        .editor-toolbar {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--surface-2);
            border-radius: var(--radius-sm);
            border-bottom: 1px solid var(--border-soft);
            font-size: 11px;
            color: var(--muted);
            flex-wrap: wrap;
        }

        .editor-toolbar strong {
            font-weight: 600;
            color: var(--text);
        }

        /* === Fecha === */
        .fecha-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-soft);
        }

        .fecha-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }

        input[type="date"] {
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 24px 12px;
            color: var(--muted-2);
            font-size: 12px;
        }

        .empty-state svg {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            opacity: 0.4;
        }

        /* === Section Label === */
        .section-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--muted);
            margin-top: 16px;
            margin-bottom: 8px;
            padding: 0 12px;
        }

        /* === Barra de departamentos === */
        .dept-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 32px; background: var(--surface);
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
        }
        .dept-tabs { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
        .dept-tab {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 6px 14px; border-radius: var(--pill);
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text-2); font-size: 12.5px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all .12s;
        }
        .dept-tab:hover { border-color: var(--border-strong); }
        .dept-tab.active { background: var(--c-midnight); color: #fff; border-color: var(--c-midnight); }
        [data-theme="dark"] .dept-tab.active { background: var(--c-misty-blue); border-color: var(--c-misty-blue); }
        .dept-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .dept-manage {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: var(--pill);
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); font-size: 12px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: all .12s;
        }
        .dept-manage:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-hover); }

        /* === Acciones de fecha === */
        .fecha-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
        .btn-save { background: var(--verde); color: #fff; }
        .btn-save:hover { background: #256640; }

        /* === Modales === */
        .modal { position: fixed; inset: 0; z-index: 200; display: none; }
        .modal.open { display: block; }
        .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(3px); }
        .modal-window {
            position: relative; margin: 6vh auto; width: min(94vw, 540px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: 0 16px 48px rgba(0,0,0,.25);
            max-height: 86vh; display: flex; flex-direction: column;
        }
        .modal-window-lg { width: min(94vw, 720px); }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 22px; border-bottom: 1px solid var(--border-soft);
            font-size: 15px; font-weight: 700;
        }
        .modal-x { background: 0; border: 0; font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer; }
        .modal-x:hover { color: var(--text); }
        .modal-body { padding: 18px 22px 22px; overflow-y: auto; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
        #nombreReunionInput { width: 100%; }
        .modal-check { display: flex; align-items: center; gap: 9px; margin-top: 14px; font-size: 12.5px; color: var(--text-2); cursor: pointer; }
        .modal-check input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--verde); flex-shrink: 0; }

        .deptos-lista { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
        .depto-row { display: flex; align-items: center; gap: 10px; }
        .depto-row .dept-dot { width: 10px; height: 10px; }
        .depto-row input { flex: 1; }
        .depto-row .btn-icon { background: transparent; border: 0; color: var(--muted); cursor: pointer; padding: 6px 9px; border-radius: var(--radius-xs); font-size: 16px; line-height: 1; }
        .depto-row .btn-icon:hover { color: var(--rojo); background: var(--rojo-bg); }
        .dept-add-row { display: flex; gap: 8px; padding-top: 14px; margin-top: 12px; border-top: 1px solid var(--border-soft); }
        .dept-add-row input { flex: 1; }

        .hist-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); }
        .hist-toolbar .sel-info { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); cursor: pointer; }
        .btn-danger { background: var(--rojo-bg); color: var(--rojo); border: 1px solid var(--rojo-border); border-radius: var(--pill); padding: 7px 14px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all .12s; }
        .btn-danger:hover { background: var(--rojo); color: #fff; }
        .btn-danger[disabled] { opacity: .4; cursor: default; }
        .btn-danger[disabled]:hover { background: var(--rojo-bg); color: var(--rojo); }
        .hist-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--rojo); flex-shrink: 0; }

        .hist-grupo { margin-bottom: 18px; }
        .hist-grupo-tit { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 8px; }
        .hist-count { background: var(--accent-soft); color: var(--accent); border-radius: var(--pill); padding: 1px 8px; font-size: 10.5px; }
        .hist-item { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; }
        .hist-item-head { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; }
        .hist-item-head:hover { background: var(--surface-hover); }
        .hist-fecha { font-weight: 700; color: var(--text); font-size: 13px; }
        .hist-when { font-size: 11px; color: var(--muted-2); }
        .hist-del { margin-left: auto; background: transparent; border: 0; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 8px; border-radius: var(--radius-xs); }
        .hist-del:hover { color: var(--rojo); background: var(--rojo-bg); }
        .hist-detalle { display: none; padding: 6px 14px 14px; border-top: 1px solid var(--border-soft); font-size: 12.5px; }
        .hist-item.open .hist-detalle { display: block; }
        .hist-detalle h4 { font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 10px 0 4px; }
        .hist-detalle ul { margin: 0; padding-left: 18px; color: var(--text-2); }
        .hist-detalle p { margin: 0; white-space: pre-wrap; color: var(--text-2); }
        .hist-share { display: flex; gap: 8px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-soft); flex-wrap: wrap; }
        .btn-share { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: var(--pill); font-size: 11.5px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text-2); transition: all .12s; }
        .btn-share:hover { border-color: var(--border-strong); background: var(--surface-hover); }
        .btn-share svg { width: 14px; height: 14px; }
        .btn-share.wa:hover { border-color: #25D366; color: #1a8a45; }
        .btn-share.pdf:hover { border-color: var(--accent-2); color: var(--accent); }

        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--c-midnight); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; z-index: 1000; box-shadow: 0 12px 28px rgba(0,0,0,.18); opacity: 0; transform: translateY(16px); transition: all .2s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--verde); }
        .toast.error { background: var(--rojo); }

        /* === Responsive === */
        @media (max-width: 768px) {
            .app-main {
                padding: 16px;
            }

            .topbar {
                padding: 0 16px;
            }

            .dept-bar { padding: 10px 16px; }

            .layout-2col {
                gap: 16px;
            }
        }
        @media (max-width: 600px) {
            .fecha-section { flex-wrap: wrap; }
            .fecha-actions { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- TOPBAR -->
        <header class="topbar">
            <span class="topbar-title" id="topbarTitle">Reunión</span>
            <div class="topbar-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- BARRA DE DEPARTAMENTOS -->
        <nav class="dept-bar">
            <div class="dept-tabs" id="deptTabs"></div>

    <script>
        // === Modelo de estado (multi-departamento) ===
        const STORAGE_KEY = 'lumi-reunion-v2';
        const PALETA = ['#3E688F', '#2E7A4F', '#B07410', '#6d4aad', '#B33B3A', '#0C2136'];

        function hoy() { return new Date().toISOString().split('T')[0]; }
        function nuevoDepto() { return { temas: [], notas: '', proximos: '', fecha: hoy() }; }

        function estadoInicial() {
            return {
                departamentos: [
                    { id: 'ventas',       nombre: 'Ventas',       color: '#3E688F' },
                    { id: 'directorio',   nombre: 'Directorio',   color: '#2E7A4F' },
                    { id: 'comunicacion', nombre: 'Comunicación', color: '#B07410' }
                ],
                deptoActivo: 'comunicacion',
                porDepto: { ventas: nuevoDepto(), directorio: nuevoDepto(), comunicacion: nuevoDepto() },
                reuniones: []
            };
        }

        let state = estadoInicial();

        // === Elementos DOM ===
        const temasACharlarEl = document.getElementById('temasACharlar');
        const temasConversadosEl = document.getElementById('temasConversados');
        const emptyStateCharlarEl = document.getElementById('emptyStateCharlar');
        const notasTextarea = document.getElementById('notasTextarea');
        const proximosTextarea = document.getElementById('proximosTextarea');
        const fechaInput = document.getElementById('fechaReunion');
        const nuevoTemaInput = document.getElementById('nuevoTemaInput');
        const agregarTemaBtn = document.getElementById('agregarTemaBtn');
        const themeToggle = document.getElementById('themeToggle');
        const topbarTitle = document.getElementById('topbarTitle');
        const deptTabsEl = document.getElementById('deptTabs');

        // Datos del departamento activo
        function dd() { return state.porDepto[state.deptoActivo]; }
        function deptoActivoObj() { return state.departamentos.find(d => d.id === state.deptoActivo) || state.departamentos[0]; }

        // === Persistencia ===
        function guardarDatos() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
            catch (e) { console.warn('No se pudo guardar en localStorage', e); }
        }

        function normalizar() {
            if (!Array.isArray(state.departamentos) || !state.departamentos.length) state.departamentos = estadoInicial().departamentos;
            if (!state.porDepto || typeof state.porDepto !== 'object') state.porDepto = {};
            state.departamentos.forEach(d => { if (!state.porDepto[d.id]) state.porDepto[d.id] = nuevoDepto(); });
            if (!Array.isArray(state.reuniones)) state.reuniones = [];
            if (!state.porDepto[state.deptoActivo]) state.deptoActivo = state.departamentos[0].id;
            Object.values(state.porDepto).forEach(dp => {
                if (!Array.isArray(dp.temas)) dp.temas = [];
                dp.temas.forEach(t => { if (t.id == null) t.id = Date.now() + Math.random(); });
            });
        }

        function cargarDatos() {
            try {
                const nuevo = localStorage.getItem(STORAGE_KEY);
                if (nuevo) { state = JSON.parse(nuevo); normalizar(); return; }
                // Migrar formato viejo (una sola reunión, era de Comunicación)
                const viejo = localStorage.getItem('lumi-reunion-data');
                if (viejo) {
                    const p = JSON.parse(viejo);
                    state.porDepto.comunicacion = {
                        temas: p.temas || [], notas: p.notas || '', proximos: p.proximos || '', fecha: p.fecha || hoy()
                    };
                    state.deptoActivo = 'comunicacion';
                }
                normalizar();
            } catch (e) { console.warn('Error cargando datos', e); normalizar(); }
        }

        // === Render ===
        function crearTemaItem(tema) {
            const li = document.createElement('div');
            li.className = 'tema-item' + (tema.conversado ? ' conversado' : '');
            li.dataset.id = tema.id;
            li.innerHTML = `
                <input type="checkbox" class="tema-checkbox" ${tema.conversado ? 'checked' : ''} />
                <span class="tema-text">${escapeHtml(tema.texto)}</span>
                <button class="tema-remove" aria-label="Eliminar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            `;

            // Checkbox: mover entre listas
            li.querySelector('.tema-checkbox').addEventListener('change', (e) => {
                tema.conversado = e.target.checked;
                guardarDatos();
                renderTemas();
            });

            // Eliminar
            li.querySelector('.tema-remove').addEventListener('click', () => {
                dd().temas = dd().temas.filter(t => t.id !== tema.id);
                guardarDatos();
                renderTemas();
            });

            // Iniciar arrastre con pointer events
            li.addEventListener('pointerdown', (e) => iniciarArrastre(e, tema, li));

            return li;
        }

        function renderTemas() {
            temasACharlarEl.innerHTML = '';
            temasConversadosEl.innerHTML = '';

            const temasActivos = dd().temas.filter(t => !t.conversado);
            const temasCompletos = dd().temas.filter(t => t.conversado);

            emptyStateCharlarEl.style.display = temasActivos.length === 0 ? 'block' : 'none';

            temasActivos.forEach(tema => temasACharlarEl.appendChild(crearTemaItem(tema)));
            temasCompletos.forEach(tema => temasConversadosEl.appendChild(crearTemaItem(tema)));
        }

        // === Drag & Drop con Pointer Events (robusto, sirve en desktop y táctil) ===
        let drag = null;
        const DRAG_THRESHOLD = 5;

        // Kill switch global: jamás dejamos que arranque el drag NATIVO del navegador.
        // El drag nativo dispara 'dragstart' y CORTA los pointer events (pointerup nunca
        // llega), que era exactamente la causa del bug. Cancelándolo, los pointer events
        // siguen fluyendo y nuestro drag funciona siempre.
        document.addEventListener('dragstart', (e) => e.preventDefault());

        function iniciarArrastre(e, tema, itemEl) {
            // Solo botón primario; ignorar clicks en checkbox o botón eliminar
            if (e.button !== 0) return;
            if (e.target.closest('.tema-checkbox') || e.target.closest('.tema-remove')) return;

            // Evita que el navegador inicie una selección de texto al arrastrar
            e.preventDefault();

            // Captura el puntero para garantizar que pointermove/pointerup lleguen
            // aunque el cursor salga del elemento o de la ventana.
            try { itemEl.setPointerCapture(e.pointerId); } catch (err) {}

            const rect = itemEl.getBoundingClientRect();
            drag = {
                tema,
                itemEl,
                pointerId: e.pointerId,
                startX: e.clientX,
                startY: e.clientY,
                offsetX: e.clientX - rect.left,
                offsetY: e.clientY - rect.top,
                width: rect.width,
                started: false,
                clone: null,
                placeholder: null
            };
        }

        function comenzarArrastreVisual(e) {
            drag.started = true;
            document.body.classList.add('dragging-active');

            const clone = drag.itemEl.cloneNode(true);
            clone.classList.add('drag-clone');
            clone.style.width = drag.width + 'px';
            clone.style.left = (e.clientX - drag.offsetX) + 'px';
            clone.style.top = (e.clientY - drag.offsetY) + 'px';
            document.body.appendChild(clone);
            drag.clone = clone;

            drag.itemEl.classList.add('drag-source');

            const ph = document.createElement('div');
            ph.className = 'drag-placeholder';
            drag.placeholder = ph;
        }

        function listaBajoCursor(e) {
            // Ocultar el clon para que elementFromPoint vea lo que hay debajo
            drag.clone.style.display = 'none';
            const el = document.elementFromPoint(e.clientX, e.clientY);
            drag.clone.style.display = '';

            if (el) {
                if (el.closest('#temasConversados')) return temasConversadosEl;
                if (el.closest('#temasACharlar')) return temasACharlarEl;
            }
            // Fallback: test por rectángulo (cubre zonas vacías de la lista)
            const dentro = (elem) => {
                const r = elem.getBoundingClientRect();
                return e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
            };
            if (dentro(temasConversadosEl)) return temasConversadosEl;
            if (dentro(temasACharlarEl)) return temasACharlarEl;
            return null;
        }

        function indiceDestino(listaEl, clientY) {
            const items = [...listaEl.querySelectorAll('.tema-item')].filter(x => x !== drag.itemEl);
            for (let i = 0; i < items.length; i++) {
                const r = items[i].getBoundingClientRect();
                if (clientY < r.top + r.height / 2) return { idx: i, beforeEl: items[i] };
            }
            return { idx: items.length, beforeEl: null };
        }

        // Campos de texto donde se puede soltar un tema para copiar su texto
        const CAMPOS_DESTINO = ['notasTextarea', 'proximosTextarea'];

        function campoBajoCursor(e) {
            drag.clone.style.display = 'none';
            const el = document.elementFromPoint(e.clientX, e.clientY);
            drag.clone.style.display = '';
            if (el) {
                const ta = el.closest('#notasTextarea, #proximosTextarea');
                if (ta) return ta;
            }
            // Fallback por rectángulo
            for (const id of CAMPOS_DESTINO) {
                const t = document.getElementById(id);
                if (!t) continue;
                const r = t.getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) return t;
            }
            return null;
        }

        function limpiarResaltadoCampos() {
            CAMPOS_DESTINO.forEach(id => {
                const t = document.getElementById(id);
                if (t) t.classList.remove('campo-drop-active');
            });
        }

        function insertarTemaEnCampo(textarea, texto) {
            const actual = textarea.value;
            const sep = (actual && !actual.endsWith('\n')) ? '\n' : '';
            textarea.value = actual + sep + '• ' + texto;
            // Dispara el auto-guardado (los listeners de input ya sincronizan el estado)
            textarea.dispatchEvent(new Event('input', { bubbles: true }));
        }

        document.addEventListener('pointermove', (e) => {
            if (!drag) return;

            if (!drag.started) {
                if (Math.hypot(e.clientX - drag.startX, e.clientY - drag.startY) < DRAG_THRESHOLD) return;
                comenzarArrastreVisual(e);
            }

            drag.clone.style.left = (e.clientX - drag.offsetX) + 'px';
            drag.clone.style.top = (e.clientY - drag.offsetY) + 'px';

            temasACharlarEl.classList.remove('list-drop-active');
            temasConversadosEl.classList.remove('list-drop-active');
            limpiarResaltadoCampos();

            // Prioridad 1: ¿está sobre un campo de texto (Notas / Próximos pasos)?
            const campo = campoBajoCursor(e);
            if (campo) {
                if (drag.placeholder.parentNode) drag.placeholder.remove();
                campo.classList.add('campo-drop-active');
                return;
            }

            // Prioridad 2: ¿está sobre una de las listas?
            const lista = listaBajoCursor(e);
            if (!lista) {
                if (drag.placeholder.parentNode) drag.placeholder.remove();
                return;
            }
            lista.classList.add('list-drop-active');
            const { beforeEl } = indiceDestino(lista, e.clientY);
            if (beforeEl) lista.insertBefore(drag.placeholder, beforeEl);
            else lista.appendChild(drag.placeholder);
        });

        document.addEventListener('pointerup', (e) => {
            if (!drag) return;

            if (drag.started) {
                // Prioridad 1: soltar sobre un campo de texto → copiar el texto del tema
                const campo = campoBajoCursor(e);
                if (campo) {
                    insertarTemaEnCampo(campo, drag.tema.texto);
                    finalizarArrastre();
                } else {
                    // Prioridad 2: soltar sobre una lista → reordenar / mover a conversados
                    const lista = listaBajoCursor(e);
                    if (lista) {
                        const aConversados = (lista === temasConversadosEl);
                        const { idx } = indiceDestino(lista, e.clientY);
                        moverTema(drag.tema, aConversados, idx);
                    }
                    finalizarArrastre();
                    guardarDatos();
                    renderTemas();
                }
            } else {
                finalizarArrastre();
            }
            drag = null;
        });

        // Si el gesto se cancela (ej. touch interrumpido), limpiar sin reordenar
        document.addEventListener('pointercancel', () => {
            if (!drag) return;
            if (drag.started) finalizarArrastre();
            drag = null;
        });

        // === Diagnóstico opcional (agregar ?debug=1 a la URL) ===
        if (location.search.includes('debug')) {
            const box = document.createElement('div');
            box.style.cssText = 'position:fixed;top:8px;right:8px;z-index:99999;background:#000;color:#0f0;font:12px/1.4 monospace;padding:10px;border-radius:8px;max-width:340px;white-space:pre-wrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.5)';
            document.body.appendChild(box);
            let pd = 0, pm = 0, pu = 0, ds = 0, lastDrop = '-', capture = '-';
            const pintar = () => {
                box.textContent =
                    `pointerdown:${pd}  pointermove:${pm}  pointerup:${pu}\n` +
                    `dragstart-nativo:${ds}\n` +
                    `setPointerCapture:${capture}\n` +
                    `lista-al-soltar:${lastDrop}\n` +
                    `--- orden actual ---\n` +
                    dd().temas.map(t => (t.conversado ? '✓ ' : '• ') + t.texto).join('\n');
            };
            document.addEventListener('dragstart', () => { ds++; pintar(); }, true);
            document.addEventListener('pointerdown', (e) => {
                pd++;
                const it = e.target.closest && e.target.closest('.tema-item');
                if (it) { try { it.setPointerCapture(e.pointerId); capture = 'OK'; it.releasePointerCapture(e.pointerId); } catch (err) { capture = 'FALLO: ' + err.message; } }
                pintar();
            }, true);
            document.addEventListener('pointermove', () => { pm++; pintar(); }, true);
            document.addEventListener('pointerup', (e) => {
                pu++;
                if (drag && drag.started) {
                    const l = listaBajoCursor(e);
                    lastDrop = l === temasConversadosEl ? 'CONVERSADOS' : (l === temasACharlarEl ? 'A CHARLAR' : 'NULL (fuera)');
                } else {
                    lastDrop = 'sin-drag-activo';
                }
                setTimeout(pintar, 0);
            }, true);
            pintar();
        }

        function finalizarArrastre() {
            document.body.classList.remove('dragging-active');
            temasACharlarEl.classList.remove('list-drop-active');
            temasConversadosEl.classList.remove('list-drop-active');
            limpiarResaltadoCampos();
            if (drag.clone) drag.clone.remove();
            if (drag.placeholder && drag.placeholder.parentNode) drag.placeholder.remove();
            if (drag.itemEl) drag.itemEl.classList.remove('drag-source');
        }

        function moverTema(tema, aConversados, insertIdx) {
            let activos = dd().temas.filter(t => !t.conversado && t !== tema);
            let conversados = dd().temas.filter(t => t.conversado && t !== tema);

            tema.conversado = aConversados;
            const destino = aConversados ? conversados : activos;

            insertIdx = Math.max(0, Math.min(insertIdx, destino.length));
            destino.splice(insertIdx, 0, tema);

            dd().temas = [...activos, ...conversados];
        }

        function setupDragTargets() { /* listeners globales ya registrados arriba */ }

        // === Agregar Tema ===
        function agregarTema() {
            const texto = nuevoTemaInput.value.trim();
            if (!texto) return;

            dd().temas.push({
                id: Date.now() + Math.random(),
                texto,
                conversado: false
            });

            nuevoTemaInput.value = '';
            nuevoTemaInput.focus();
            guardarDatos();
            renderTemas();
        }

        agregarTemaBtn.addEventListener('click', agregarTema);
        nuevoTemaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') agregarTema();
        });

        // === Notas Auto-save (sobre el departamento activo) ===
        notasTextarea.addEventListener('input', () => {
            dd().notas = notasTextarea.value;
            guardarDatos();
        });

        proximosTextarea.addEventListener('input', () => {
            dd().proximos = proximosTextarea.value;
            guardarDatos();
        });

        fechaInput.addEventListener('change', () => {
            dd().fecha = fechaInput.value;
            guardarDatos();
        });

        // === Theme Toggle ===
        themeToggle.addEventListener('click', () => {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            try {
                localStorage.setItem('lumi-reunion.theme', next);
            } catch (e) {}
        });

        // === Utilidades ===
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // === Departamentos: tabs y cambio ===
        function renderTabs() {
            deptTabsEl.innerHTML = '';
            state.departamentos.forEach(dep => {
                const b = document.createElement('button');
                b.className = 'dept-tab' + (dep.id === state.deptoActivo ? ' active' : '');
                b.innerHTML = `<span class="dept-dot" style="background:${dep.color}"></span>${escapeHtml(dep.nombre)}`;
                b.addEventListener('click', () => switchDepto(dep.id));
                deptTabsEl.appendChild(b);
            });
        }

        function switchDepto(id) {
            if (!state.porDepto[id]) state.porDepto[id] = nuevoDepto();
            state.deptoActivo = id;
            guardarDatos();
            actualizarTitulo();
            renderTabs();
            sincronizarCampos();
            renderTemas();
        }

        function actualizarTitulo() { topbarTitle.textContent = 'Reunión · ' + deptoActivoObj().nombre; }

        function sincronizarCampos() {
            notasTextarea.value = dd().notas || '';
            proximosTextarea.value = dd().proximos || '';
            fechaInput.value = dd().fecha || hoy();
        }

        // === Administrar departamentos ===
        function nuevoIdDepto() { return 'd' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5); }

        function renderDeptosLista() {
            const cont = document.getElementById('deptosLista');
            cont.innerHTML = '';
            state.departamentos.forEach(dep => {
                const row = document.createElement('div');
                row.className = 'depto-row';
                row.innerHTML = `<span class="dept-dot" style="background:${dep.color}"></span>
                    <input type="text" value="${escapeHtml(dep.nombre)}" />
                    <button class="btn-icon" title="Eliminar">&times;</button>`;
                const input = row.querySelector('input');
                input.addEventListener('input', () => {
                    dep.nombre = input.value;
                    guardarDatos(); renderTabs(); actualizarTitulo();
                });
                row.querySelector('.btn-icon').addEventListener('click', () => eliminarDepto(dep.id));
                cont.appendChild(row);
            });
        }

        function agregarDepto() {
            const input = document.getElementById('nuevoDeptoInput');
            const nombre = input.value.trim();
            if (!nombre) return;
            const id = nuevoIdDepto();
            const color = PALETA[state.departamentos.length % PALETA.length];
            state.departamentos.push({ id, nombre, color });
            state.porDepto[id] = nuevoDepto();
            input.value = '';
            input.focus();
            guardarDatos(); renderDeptosLista(); renderTabs();
            toast('Departamento agregado', 'success');
        }

        function eliminarDepto(id) {
            if (state.departamentos.length <= 1) { toast('Tiene que quedar al menos un departamento', 'error'); return; }
            const dep = state.departamentos.find(d => d.id === id);
            if (!confirm('¿Eliminar "' + dep.nombre + '"? Se borran sus temas pendientes (las reuniones guardadas se conservan).')) return;
            state.departamentos = state.departamentos.filter(d => d.id !== id);
            delete state.porDepto[id];
            if (state.deptoActivo === id) state.deptoActivo = state.departamentos[0].id;
            guardarDatos();
            renderDeptosLista(); renderTabs(); actualizarTitulo(); sincronizarCampos(); renderTemas();
        }

        // === Guardar reunión (backlog inteligente) ===
        function hayAlgoParaGuardar() {
            const d = dd();
            return d.temas.length || (d.notas || '').trim() || (d.proximos || '').trim();
        }

        // Paso 1: pedir el nombre (opcional) en un modal
        function pedirNombreReunion() {
            if (!hayAlgoParaGuardar()) { toast('No hay nada para guardar todavía', 'error'); return; }
            const input = document.getElementById('nombreReunionInput');
            input.value = '';
            document.getElementById('mantenerProximosCheck').checked = false;
            abrirModal('modalGuardar');
            setTimeout(() => input.focus(), 50);
        }

        // Paso 2: confirmar con el nombre escrito
        function confirmarGuardarReunion() {
            const nombre = document.getElementById('nombreReunionInput').value;
            const mantenerProximos = document.getElementById('mantenerProximosCheck').checked;
            document.getElementById('modalGuardar').classList.remove('open');
            guardarReunion(nombre, mantenerProximos);
        }

        function guardarReunion(nombre, mantenerProximos) {
            const d = dd();
            if (!hayAlgoParaGuardar()) { toast('No hay nada para guardar todavía', 'error'); return; }
            const dep = deptoActivoObj();
            state.reuniones.unshift({
                id: Date.now() + Math.random(),
                deptoId: dep.id,
                deptoNombre: dep.nombre,
                nombre: (nombre || '').trim(),
                fecha: d.fecha || hoy(),
                guardadaEl: new Date().toISOString(),
                notas: d.notas || '',
                proximos: d.proximos || '',
                temas: d.temas.map(t => ({ texto: t.texto, conversado: !!t.conversado }))
            });
            // Lo conversado se archiva; lo pendiente queda para la próxima; notas se limpian
            d.temas = d.temas.filter(t => !t.conversado);
            d.notas = '';
            if (!mantenerProximos) d.proximos = '';
            d.fecha = hoy();
            guardarDatos();
            sincronizarCampos();
            renderTemas();
            toast('Reunión guardada en ' + dep.nombre, 'success');
        }

        // === Historial de reuniones ===
        function formatFecha(s) {
            if (!s) return '';
            const d = new Date(s.length <= 10 ? s + 'T00:00:00' : s);
            if (isNaN(d.getTime())) return s;
            const p = n => String(n).padStart(2, '0');
            let out = `${p(d.getDate())}/${p(d.getMonth() + 1)}/${d.getFullYear()}`;
            if (s.length > 10) out += ` · ${p(d.getHours())}:${p(d.getMinutes())}`;
            return out;
        }

        function renderHistorial() {
            const cont = document.getElementById('histContenido');
            if (!state.reuniones.length) {
                cont.innerHTML = '<div class="empty-state">Todavía no guardaste ninguna reunión.</div>';
                return;
            }
            const grupos = {};
            state.reuniones.forEach(r => { (grupos[r.deptoId] = grupos[r.deptoId] || []).push(r); });

            // Barra de selección
            let html = `<div class="hist-toolbar">
                <label class="sel-info"><input type="checkbox" class="hist-check" id="histSelAll"> Seleccionar todas (${state.reuniones.length})</label>
                <button class="btn-danger" id="histDelSel" disabled>Eliminar seleccionadas</button>
            </div>`;

            const renderGrupo = (nombre, color, rs) => {
                html += `<div class="hist-grupo"><div class="hist-grupo-tit"><span class="dept-dot" style="background:${color || 'var(--muted)'}"></span>${escapeHtml(nombre)}<span class="hist-count">${rs.length}</span></div>`;
                rs.forEach(r => {
                    const tratados = (r.temas || []).filter(t => t.conversado);
                    const pend = (r.temas || []).filter(t => !t.conversado);
                    html += `<div class="hist-item" data-id="${r.id}">
                        <div class="hist-item-head">
                            <input type="checkbox" class="hist-check" data-sel="${r.id}" title="Seleccionar">
                            <span class="hist-fecha">${r.nombre ? escapeHtml(r.nombre) : formatFecha(r.fecha)}</span>
                            <span class="hist-when">${r.nombre ? formatFecha(r.fecha) + ' · ' : ''}guardada ${formatFecha(r.guardadaEl)}</span>
                        </div>
                        <div class="hist-detalle">
                            ${tratados.length ? `<h4>Temas tratados</h4><ul>${tratados.map(t => '<li>' + escapeHtml(t.texto) + '</li>').join('')}</ul>` : ''}
                            ${pend.length ? `<h4>Quedaron pendientes</h4><ul>${pend.map(t => '<li>' + escapeHtml(t.texto) + '</li>').join('')}</ul>` : ''}
                            <h4>Notas</h4><p>${r.notas ? escapeHtml(r.notas) : '—'}</p>
                            <h4>Próximos pasos</h4><p>${r.proximos ? escapeHtml(r.proximos) : '—'}</p>
                            <div class="hist-share">
                                <button class="btn-share wa" data-share="wa" data-id="${r.id}">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.817 11.817 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.51 5.26l-.999 3.648 3.978-1.717z"/></svg>
                                    WhatsApp
                                </button>
                                <button class="btn-share mail" data-share="mail" data-id="${r.id}">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-10 5L2 7"></path></svg>
                                    Email
                                </button>
                                <button class="btn-share pdf" data-share="pdf" data-id="${r.id}">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
                                    Descargar PDF
                                </button>
                            </div>
                        </div>
                    </div>`;
                });
                html += '</div>';
            };

            state.departamentos.forEach(dep => {
                if (grupos[dep.id]) { renderGrupo(dep.nombre, dep.color, grupos[dep.id]); delete grupos[dep.id]; }
            });
            // Reuniones de departamentos ya eliminados
            Object.keys(grupos).forEach(id => renderGrupo(grupos[id][0].deptoNombre || 'Archivados', null, grupos[id]));

            cont.innerHTML = html;

            const checks = () => [...cont.querySelectorAll('input[data-sel]')];
            const btnDel = document.getElementById('histDelSel');
            const selAll = document.getElementById('histSelAll');

            function actualizarBarra() {
                const sel = checks().filter(c => c.checked);
                btnDel.disabled = sel.length === 0;
                btnDel.textContent = sel.length ? `Eliminar seleccionadas (${sel.length})` : 'Eliminar seleccionadas';
                selAll.checked = sel.length > 0 && sel.length === checks().length;
            }

            // Expandir detalle al clickear la fila (salvo el checkbox)
            cont.querySelectorAll('.hist-item-head').forEach(h => {
                h.addEventListener('click', (e) => {
                    if (e.target.closest('input[data-sel]')) return;
                    h.parentNode.classList.toggle('open');
                });
            });
            checks().forEach(c => {
                c.addEventListener('click', (e) => e.stopPropagation());
                c.addEventListener('change', actualizarBarra);
            });
            selAll.addEventListener('change', () => { checks().forEach(c => c.checked = selAll.checked); actualizarBarra(); });

            btnDel.addEventListener('click', () => {
                const ids = new Set(checks().filter(c => c.checked).map(c => c.getAttribute('data-sel')));
                if (!ids.size) return;
                if (!confirm(`¿Eliminar ${ids.size} reunión(es) seleccionada(s)? No se puede deshacer.`)) return;
                state.reuniones = state.reuniones.filter(r => !ids.has(String(r.id)));
                guardarDatos();
                renderHistorial();
                toast('Reuniones eliminadas', 'success');
            });

            // Compartir cada reunión
            cont.querySelectorAll('[data-share]').forEach(b => {
                b.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const r = state.reuniones.find(x => String(x.id) === b.getAttribute('data-id'));
                    if (!r) return;
                    const accion = b.getAttribute('data-share');
                    if (accion === 'wa') compartirWhatsApp(r);
                    else if (accion === 'mail') compartirEmail(r);
                    else if (accion === 'pdf') descargarPDFReunion(r);
                });
            });
        }

        // === Compartir / exportar reuniones ===
        function tituloReunion(r) {
            return (r.nombre || ('Reunión ' + formatFecha(r.fecha))) + ' — ' + r.deptoNombre;
        }

        function textoReunion(r) {
            const L = [];
            L.push('*' + (r.nombre || ('Reunión ' + formatFecha(r.fecha))) + '* — ' + r.deptoNombre);
            L.push('Fecha: ' + formatFecha(r.fecha));
            const tratados = (r.temas || []).filter(t => t.conversado);
            const pend = (r.temas || []).filter(t => !t.conversado);
            if (tratados.length) { L.push('', '*Temas tratados:*'); tratados.forEach(t => L.push('• ' + t.texto)); }
            if (pend.length) { L.push('', '*Quedaron pendientes:*'); pend.forEach(t => L.push('• ' + t.texto)); }
            if ((r.notas || '').trim()) { L.push('', '*Notas:*', r.notas.trim()); }
            if ((r.proximos || '').trim()) { L.push('', '*Próximos pasos:*', r.proximos.trim()); }
            return L.join('\n');
        }

        function compartirWhatsApp(r) {
            window.open('https://wa.me/?text=' + encodeURIComponent(textoReunion(r)), '_blank');
        }

        function compartirEmail(r) {
            window.location.href = 'mailto:?subject=' + encodeURIComponent(tituloReunion(r)) + '&body=' + encodeURIComponent(textoReunion(r));
        }

        function descargarPDFReunion(r) {
            const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const nl2 = s => esc(s).replace(/\n/g, '<br>');
            const lista = arr => arr.length ? '<ul>' + arr.map(t => '<li>' + esc(t.texto) + '</li>').join('') + '</ul>' : '<p class="muted">—</p>';
            const tratados = (r.temas || []).filter(t => t.conversado);
            const pend = (r.temas || []).filter(t => !t.conversado);
            const titulo = r.nombre || ('Reunión ' + formatFecha(r.fecha));
            const win = window.open('', '_blank');
            if (!win) { toast('Permití las ventanas emergentes para descargar el PDF', 'error'); return; }
            win.document.write(`<!doctype html><html lang="es"><head><meta charset="utf-8"><title>${esc(titulo)}</title>
                <style>
                    body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:#111;max-width:720px;margin:32px auto;padding:0 24px;line-height:1.55}
                    h1{font-size:20px;margin:0 0 4px}
                    .meta{color:#666;font-size:13px;margin-bottom:22px}
                    h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#666;border-bottom:1px solid #ddd;padding-bottom:5px;margin:22px 0 8px}
                    ul{margin:0;padding-left:20px} li{margin:3px 0}
                    p{margin:0;white-space:pre-wrap} .muted{color:#999}
                    @media print{body{margin:0}}
                </style></head><body>
                <h1>${esc(titulo)}</h1>
                <div class="meta">${esc(r.deptoNombre)} &middot; ${formatFecha(r.fecha)}</div>
                ${tratados.length ? `<h2>Temas tratados</h2>${lista(tratados)}` : ''}
                ${pend.length ? `<h2>Quedaron pendientes</h2>${lista(pend)}` : ''}
                <h2>Notas</h2>${r.notas ? `<p>${nl2(r.notas)}</p>` : '<p class="muted">—</p>'}
                <h2>Próximos pasos</h2>${r.proximos ? `<p>${nl2(r.proximos)}</p>` : '<p class="muted">—</p>'}
                </body></html>`);
            win.document.close();
            win.focus();
            setTimeout(() => win.print(), 300);
        }

        // === Modales y toast ===
        function abrirModal(id) { document.getElementById(id).classList.add('open'); }

        let toastTimer;
        function toast(msg, tipo) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (tipo ? ' ' + tipo : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.className = 'toast'; }, 2600);
        }

        // === Init ===
        cargarDatos();
        actualizarTitulo();
        renderTabs();
        sincronizarCampos();
        renderTemas();
        setupDragTargets();

        // Wiring de botones y modales
        document.getElementById('deptManageBtn').addEventListener('click', () => { renderDeptosLista(); abrirModal('modalDeptos'); });
        document.getElementById('agregarDeptoBtn').addEventListener('click', agregarDepto);
        document.getElementById('nuevoDeptoInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') agregarDepto(); });
        document.getElementById('verTodasBtn').addEventListener('click', () => { renderHistorial(); abrirModal('modalHistorial'); });
        document.getElementById('guardarReunionBtn').addEventListener('click', pedirNombreReunion);
        document.getElementById('confirmarGuardarBtn').addEventListener('click', confirmarGuardarReunion);
        document.getElementById('nombreReunionInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') confirmarGuardarReunion(); });
        document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => el.closest('.modal').classList.remove('open')));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') document.querySelectorAll('.modal.open').forEach(m => m.classList.remove('open')); });

        nuevoTemaInput.focus();
    </script>
</body>
</html>
